<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="fruit-chat" />
  <title>fruit-chat · Apple Intelligence</title>
  <meta name="description" content="A premium chat interface powered by Apple's on-device Foundation Models — private, fast, and free." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Ambient background orbs -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="app-shell">

    <!-- ── Sidebar ─────────────────────────────────── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-icon" aria-hidden="true">🍎</div>
          <div class="brand-text">
            <span class="brand-name">fruit-chat</span>
            <span class="brand-sub">Apple Intelligence</span>
          </div>
        </div>
        <button class="btn-icon sidebar-close" id="sidebar-close-btn" title="Close sidebar" aria-label="Close sidebar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <!-- Model status pill -->
      <div class="status-pill" id="status-pill">
        <span class="status-dot" id="status-dot"></span>
        <span class="status-text" id="status-text">Checking…</span>
      </div>

      <!-- New chat -->
      <button class="btn-new-chat" id="new-chat-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        New Conversation
      </button>

      <!-- Conversation list -->
      <div class="conv-list-wrapper">
        <div class="conv-list-label">Recents</div>
        <div class="conv-list" id="conv-list" role="list"></div>
      </div>

      <!-- Settings toggle -->
      <button class="settings-toggle" id="settings-toggle-btn" aria-expanded="false">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
        Settings
      </button>
    </aside>

    <!-- ── Settings Panel ──────────────────────────── -->
    <div class="settings-panel glass" id="settings-panel" hidden>
      <div class="settings-header">
        <span>Settings</span>
        <button class="btn-icon" id="settings-close-btn" aria-label="Close settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <label class="setting-label">
        System Prompt
        <textarea id="system-prompt-input" class="setting-textarea" placeholder="You are a helpful assistant..." rows="4"></textarea>
      </label>
      <label class="setting-label">
        Max Tokens
        <input type="number" id="max-tokens-input" class="setting-input" value="2048" min="64" max="4096" />
      </label>
      <label class="setting-label">
        Temperature
        <div class="range-row">
          <input type="range" id="temp-slider" class="setting-range" min="0" max="1" step="0.05" value="0.7" />
          <span class="range-val" id="temp-val">0.7</span>
        </div>
      </label>
      <button class="btn-save-settings" id="save-settings-btn">Save Settings</button>
    </div>

    <!-- ── Main area ───────────────────────────────── -->
    <main class="chat-area" id="chat-area">

      <!-- Top bar -->
      <header class="topbar">
        <button class="btn-icon sidebar-open" id="sidebar-open-btn" aria-label="Open sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="topbar-title" id="topbar-title">New Conversation</div>

        <!-- Theme toggle: cycles system → dark → light → system -->
        <button class="btn-theme" id="theme-toggle-btn" title="Toggle theme" aria-label="Toggle color theme">
          <!-- Sun icon (light mode) -->
          <svg class="icon-sun" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <!-- Moon icon (dark mode) -->
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          <!-- System / auto icon -->
          <svg class="icon-system" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        </button>

        <button class="btn-icon" id="clear-chat-btn" title="Clear conversation" aria-label="Clear conversation">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
        </button>
      </header>


      <!-- Messages -->
      <div class="messages-wrapper">
        <div class="messages" id="messages" role="log" aria-live="polite" aria-label="Chat messages">
          <!-- Welcome state -->
          <div class="welcome-state" id="welcome-state">
            <div class="welcome-icon" aria-hidden="true">🍎</div>
            <h1 class="welcome-title">Apple Intelligence</h1>
            <p class="welcome-sub">On-device AI, completely private.<br />No cloud. No API keys. Just your Mac.</p>
            <div class="welcome-chips">
              <button class="chip" data-prompt="Summarize the key features of Apple Intelligence in a concise list.">Summarize Apple Intelligence</button>
              <button class="chip" data-prompt="Write a short haiku about programming.">Write a haiku about code</button>
              <button class="chip" data-prompt="Explain what large language models are in simple terms.">Explain LLMs simply</button>
              <button class="chip" data-prompt="What are three ways I can be more productive on my Mac?">Mac productivity tips</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Input area -->
      <div class="input-area">
        <div class="input-row glass">
          <textarea
            id="message-input"
            class="message-input"
            placeholder="Message Apple Intelligence…"
            rows="1"
            aria-label="Message input"
            autocomplete="off"
            spellcheck="true"
          ></textarea>
          <button class="btn-send" id="send-btn" aria-label="Send message" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 19V5M5 12l7-7 7 7"/>
            </svg>
          </button>
        </div>
        <div class="input-footer">
          <span>Powered by <strong>apfel</strong> · Apple FoundationModels · On-device</span>
          <span id="char-count" class="char-count"></span>
        </div>
      </div>

    </main>
  </div>

  <!-- Loading overlay for model init -->
  <div class="model-loading-overlay" id="model-loading-overlay" hidden>
    <div class="model-loading-card glass">
      <div class="spinner" aria-hidden="true"></div>
      <p>Apple Intelligence is initializing…</p>
      <span>This may take a moment on first use</span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
